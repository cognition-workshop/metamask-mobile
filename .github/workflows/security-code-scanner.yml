name: MetaMask Security Code Scanner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-security-scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run AI Mobile Security Analysis
        run: |
          node scripts/mobile-security-analyzer.js > mobile-security-report.json

      - name: MetaMask Security Code Scanner
        uses: MetaMask/Security-Code-Scanner@main
        with:
          repo: ${{ github.repository }}
          paths_ignored: |
            e2e/
            docs/
            .storybook/
            '**/*.test.js'
            '**/*.test.ts'
            '**/*.test.jsx'
            '**/*.test.tsx'
            '**/*.stories.tsx'
            '**/*.stories.js'
            '**/*.snap'
          rules_excluded: example
          project_metrics_token: ${{secrets.SECURITY_SCAN_METRICS_TOKEN}}
          slack_webhook: ${{ secrets.APPSEC_BOT_SLACK_WEBHOOK }}

      - name: Upload Mobile Security Report
        uses: actions/upload-artifact@v4
        with:
          name: mobile-security-analysis-report
          path: mobile-security-report.json
          retention-days: 30

      - name: Combine Security Reports
        run: |
          echo "## Mobile Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "$(cat mobile-security-report.json | jq -r '.summary | to_entries[] | "- \(.key): \(.value)"')" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('mobile-security-report.json', 'utf8'));
            const comment = `## 📱 Mobile Security Analysis Results
            
            **Files Scanned:** ${report.summary.total_files_scanned}
            **Security Issues Found:** ${report.summary.security_issues_found}
            **High-Risk Patterns:** ${report.summary.high_risk_patterns}
            **Medium-Risk Patterns:** ${report.summary.medium_risk_patterns}
            **Mobile-Specific Issues:** ${report.mobile_specific_findings.length}
            
            ${report.summary.high_risk_patterns > 0 ? '⚠️ **High-risk security patterns detected!**' : '✅ **No high-risk patterns found**'}
            
            ### Top Issue Types:
            ${Object.entries(report.breakdown_by_type).slice(0, 5).map(([type, count]) => `- ${type}: ${count}`).join('\n')}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
